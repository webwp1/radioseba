        .navbar a.active { color: var(--primary); }

        .video-box { width: 100%; aspect-ratio: 16/9; margin-top: 20px; border-radius: 15px; overflow: hidden; border: 2px solid var(--primary); }
        p { line-height: 1.6; opacity: 0.9; }
    </style>
</head>
