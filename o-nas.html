<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O nás | Rádio Sebastián</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #0a0e17; --card: #161b26; --text: #ffffff; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        nav { background: #111827; padding: 15px; display: flex; justify-content: center; gap: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--primary); }
        nav a { color: white; text-decoration: none; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; transition: 0.3s; padding: 5px 10px; }
        nav a:hover { color: var(--primary); }
        nav a[href="o-nas.html"] { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .post-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(0, 242, 255, 0.2); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Domov</a>
        <a href="o-nas.html">O nás</a>
        <a href="playlist.html">Playlist</a>
    </nav>

    <div class="container">
        <h1 style="text-align: center; color: var(--primary)">O NÁS</h1>
        <div class="post-card">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/DhaKFnAmBwQ" allowfullscreen></iframe>
            </div>
            <div style="padding: 20px;">
                <h2>Moja návšteva v Europa 2</h2>
                <p>Nezabudnuteľný zážitok v rádiu Europa 2!</p>
            </div>
        </div>
    </div>
</body>
</html>
