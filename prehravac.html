<!DOCTYPE html>
<html lang="sk">
<head>
    <style>
        body { margin: 0; background: #161b26; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .play-btn { background: #00f2ff; border: none; width: 80px; height: 80px; border-radius: 50%; font-size: 30px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px #00f2ff; }
        #track-info { font-weight: bold; text-align: center; padding: 0 10px; }
    </style>
</head>
<body>
    <button class="play-btn" id="playBtn">▶</button>
    <div id="track-info">Načítám...</div>
    <audio id="audio" src="https://stream.zeno.fm/ueoubhhgiortv"></audio>

    <script>
        const audio = document.getElementById('audio');
        const btn = document.getElementById('playBtn');
        btn.onclick = () => {
            if(audio.paused) { audio.play(); btn.innerText = '⏸'; }
            else { audio.pause(); btn.innerText = '▶'; }
        };
        // Metadata (co hraje)
        const es = new EventSource("https://api.zeno.fm/mounts/metadata/subscribe/ueoubhhgiortv");
        es.onmessage = (e) => {
            const data = JSON.parse(e.data);
            document.getElementById('track-info').innerText = data.streamTitle || "Rádio Sebastián";
        };
    </script>
</body>
</html>
