<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rádio Sebastián - Live</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0e17;
            --text: #ffffff;
            --nav-bg: #111827;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* SHODNÁ NAVIGAČNÍ LIŠTA */
        .navbar {
            width: 100%;
            background: var(--nav-bg);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 25px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.3s;
            padding: 5px 10px;
        }

        .navbar a:hover {
            color: var(--primary);
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: calc(100vh - 54px); /* Odečtení výšky lišty */
            background: radial-gradient(circle at center, #1a2333 0%, #0a0e17 100%);
        }

        .player-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .logo-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.25);
            background: #000;
            animation: spin 4s linear infinite;
            animation-play-state: paused;
            overflow: hidden;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-name {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 35px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 700;
        }

        #track-info { 
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 600; 
            margin-bottom: 25px;
            max-width: 600px;
            min-height: 2.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .play-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        .volume-container {
            width: 100%;
            max-width: 250px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        footer {
            padding: 50px 20px;
            text-align: center;
            width: 100%;
            background: rgba(0,0,0,0.3);
        }

        .footer-content {
            opacity: 0.8;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #fff;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        footer a:hover {
            border-bottom: 1px solid var(--primary);
        }

        @media (max-width: 600px) {
            .navbar { gap: 15px; }
            .navbar a { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">Domov</a>
        <a href="playlist.html">Playlist</a>
        <a href="o-nas.html">O nás</a>
    </nav>

    <div class="wrapper">
        <main class="player-content">
            <div class="logo-circle" id="rsLogo">
                <img src="https://lh3.googleusercontent.com/pw/AP1GczM_tU_658e4tE0Wj7U_K2r_y-F6B_V8W5P1k" alt="Logo Rádio Sebastián">
            </div>

            <div class="brand-name">Rádio Sebastián</div>

            <div class="status-label">PRÁVE HRÁ</div>
            <div id="track-info">Načítavam vysielanie...</div>
            
            <button class="play-btn" id="playBtn">
                <i class="fas fa-play" id="playIcon"></i>
            </button>
            
            <div class="volume-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
                <i class="fas fa-volume-up"></i>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                © 2026 Rádio Sebastián • Všetky práva vyhradené<br>
                <a href="https://sites.google.com/view/martin-weby/web" target="_blank">Tento web vytvoril Martin</a>
            </div>
        </footer>
    </div>

    <audio id="audio" src="https://stream.zeno.fm/ueoubhhgiortv"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const trackInfo = document.getElementById('track-info');
        const volumeSlider = document.getElementById('volume');
        const rsLogo = document.getElementById('rsLogo');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(e => console.error("Chyba: ", e));
                playIcon.className = 'fas fa-pause';
                rsLogo.style.animationPlayState = 'running';
            } else {
                audio.pause();
                playIcon.className = 'fas fa-play';
                rsLogo.style.animationPlayState = 'paused';
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        const eventSource = new EventSource("https://api.zeno.fm/mounts/metadata/subscribe/ueoubhhgiortv");
        eventSource.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                trackInfo.innerText = data.streamTitle || "Rádio Sebastián - Live";
            } catch (e) {
                trackInfo.innerText = "Rádio Sebastián - Live";
            }
        };
    </script>
</body>
</html>
