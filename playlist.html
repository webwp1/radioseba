<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist | Rádio Sebastián</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #0a0e17; --card: #161b26; --text: #ffffff; --nav-bg: #111827; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        .navbar { width: 100%; background: var(--nav-bg); padding: 15px 0; display: flex; justify-content: center; gap: 25px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; }
        .navbar a { color: white; text-decoration: none; text-transform: uppercase; font-weight: 800; font-size: 0.9rem; }
        .navbar a.active { color: var(--primary); }

        .container { max-width: 600px; margin: 30px auto; padding: 0 15px; }
        .now-playing { background: var(--card); border: 2px solid var(--primary); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .track-item { background: var(--card); margin-bottom: 5px; padding: 15px; border-radius: 10px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .track-item.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
        .play-icon { color: var(--primary); margin-right: 15px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html">Domov</a>
        <a href="playlist.html" class="active">Playlist</a>
        <a href="o-nas.html">O nás</a>
    </nav>

    <div class="container">
        <div class="now-playing">
            <small style="color:var(--primary)">PRÁVĚ HRAJE</small>
            <h2 id="current">Rádio Sebastián</h2>
        </div>
        <div id="playlist">
            <div class="track-item"><i class="fas fa-play play-icon"></i><span>Jax Jones - You Don't Know Me</span></div>
            <div class="track-item"><i class="fas fa-play play-icon"></i><span>Kaoma - Lambada</span></div>
            <div class="track-item"><i class="fas fa-play play-icon"></i><span>ACDC - Thunderstruck</span></div>
            </div>
    </div>

    <script>
        const es = new EventSource("https://api.zeno.fm/mounts/metadata/subscribe/ueoubhhgiortv");
        es.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const title = data.streamTitle || "Rádio Sebastián";
            document.getElementById('current').innerText = title;
            // Zvýraznění v seznamu
            document.querySelectorAll('.track-item').forEach(item => {
                if(title.toLowerCase().includes(item.innerText.toLowerCase())) item.classList.add('active');
                else item.classList.remove('active');
            });
        };
    </script>
</body>
</html>
