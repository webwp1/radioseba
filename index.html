<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio Sebastián | Domov</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #0a0e17; --card: #161b26; --text: #ffffff; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        
        /* NAVIGAČNÍ LIŠTA */
        nav { background: #111827; padding: 15px; display: flex; justify-content: center; gap: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--primary); }
        nav a { color: white; text-decoration: none; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; transition: 0.3s; padding: 5px 10px; }
        nav a:hover { color: var(--primary); }
        nav a.active { border-bottom: 2px solid var(--primary); color: var(--primary); }

        .hero { min-height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
        .logo-text { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .launch-btn { display: inline-flex; align-items: center; gap: 15px; background: var(--primary); color: #000; padding: 20px 45px; border-radius: 50px; text-decoration: none; font-weight: 900; margin-top: 30px; box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        footer { padding: 40px; text-align: center; opacity: 0.6; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Domov</a>
        <a href="o-nas.html">O nás</a>
        <a href="playlist.html">Playlist</a>
    </nav>

    <section class="hero">
        <div class="logo-text">Rádio Sebastián</div>
        <a href="https://zeno.fm/radio/radio-sebastian/" target="_blank" class="launch-btn">
            <i class="fas fa-play"></i> Spustiť rádio
        </a>
    </section>

    <div class="grid">
        <div class="card">
            <h2 style="color: var(--primary)">Program</h2>
            <p>Pondelok - Nedeľa: <strong>NONSTOP</strong></p>
        </div>
        <div class="card">
            <h2 style="color: var(--primary)">Kontakt</h2>
            <p><i class="fas fa-envelope"></i> radiosebastian565@gmail.com</p>
        </div>
    </div>

    <footer>© 2026 Rádio Sebastián</footer>
</body>
</html>
