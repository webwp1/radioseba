<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio Sebastián | Domov</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #0a0e17; --nav-bg: #111827; --text: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; }
        
        /* Navigace */
        .navbar { width: 100%; background: var(--nav-bg); padding: 15px 0; display: flex; justify-content: center; gap: 25px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--primary); }
        .navbar a { color: white; text-decoration: none; text-transform: uppercase; font-weight: 800; font-size: 0.9rem; transition: 0.3s; }
        .navbar a:hover, .navbar a.active { color: var(--primary); }

        .hero { text-align: center; padding: 50px 20px; }
        h1 { font-size: 2.5rem; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
        
        .player-frame { width: 100%; max-width: 450px; height: 350px; border: none; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
        
        footer { margin-top: 50px; padding: 20px; opacity: 0.7; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="active">Domov</a>
        <a href="playlist.html">Playlist</a>
        <a href="o-nas.html">O nás</a>
    </nav>

    <div class="hero">
        <h1>Rádio Sebastián</h1>
        <p>Tvoje oblíbené internetové rádio</p>
        <iframe src="prehravac.html" class="player-frame"></iframe>
    </div>

    <footer>© 2026 Rádio Sebastián</footer>
</body>
</html>
